<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="98" fill="#F3E8DC" stroke="#8B4A4E" stroke-width="3"/>
  
  <!-- Inner circle accent -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#D4A5A5" stroke-width="2" opacity="0.6"/>
  
  <!-- Elegant M with makeup theme -->
  <g transform="translate(50, 55)">
    <!-- Left stroke of M -->
    <path d="M 10 80 L 10 20 Q 10 10 20 10 L 30 10 Q 35 10 35 20 L 35 70" 
          stroke="#5C3B3E" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Center point of M -->
    <path d="M 35 35 Q 50 15 65 35" 
          stroke="#D97B8C" stroke-width="7" fill="none" stroke-linecap="round"/>
    
    <!-- Right stroke of M -->
    <path d="M 65 70 L 65 20 Q 65 10 75 10 L 85 10 Q 95 10 95 20 L 95 80" 
          stroke="#5C3B3E" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Small blush accent dot -->
    <circle cx="50" cy="90" r="4" fill="#D97B8C"/>
    <circle cx="75" cy="90" r="4" fill="#D97B8C"/>
  </g>
</svg>
